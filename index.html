<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Beloved Cosmic Unified</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #video {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 95px;
            height: 130px;
            border-radius: 16px;
            border: 2px solid rgba(255, 105, 180, 0.4);
            transform: scaleX(-1);
            object-fit: cover;
            z-index: 10;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            z-index: 100;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.5s ease;
        }

        .glass-btn {
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.2), rgba(255, 192, 203, 0.1));
            border: 1px solid rgba(255, 105, 180, 0.4);
            padding: 16px 40px;
            color: white;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            margin-top: 25px;
            box-shadow: 0 4px 20px rgba(255, 105, 180, 0.2);
            letter-spacing: 1px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="overlay">
        <h2 style="color: #ff69b4; font-size: 1.8rem; margin-bottom: 10px;">✨ Cosmic Gesture ✨</h2>
        <p style="color: #ccc; max-width: 280px; font-size: 0.95rem; line-height: 1.5;">Place phone steadily, step back, and count down with your fingers (1 → 2 → 3 → Open Palm!).</p>
        <button class="glass-btn" onclick="startExperience()">Open Portal</button>
    </div>

    <canvas id="canvas"></canvas>
    <video id="video" playsinline></video>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');

        let currentStage = 0; // 0: Sky, 1: "1", 2: "2", 3: "3", 4: Boom, 5: Horizontal I ❤️ YOU
        let particles = [];
        let balloons = [];
        let maxParticles = 1200; 

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class CosmicParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 1.2;
                this.vy = (Math.random() - 0.5) * 1.2;
                this.size = 1.8 + Math.random() * 2.2;
                this.color = 'rgba(255, 255, 255, 0.7)';
                this.ease = 0.06 + Math.random() * 0.05;
                this.isExploding = false;
            }

            updateAmbient() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                this.color = 'rgba(255, 255, 255, 0.65)';
            }

            updateTarget(tx, ty, targetColor) {
                this.x += (tx - this.x) * this.ease;
                this.y += (ty - this.y) * this.ease;
                this.color = targetColor;
            }

            explode() {
                const angle = Math.random() * Math.PI * 2;
                const force = 14 + Math.random() * 16;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
            }

            updateExplosion() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.92;
                this.vy *= 0.92;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class BackgroundBalloon {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 40;
                this.radius = 18 + Math.random() * 14;
                this.speedY = 1.1 + Math.random() * 1.4;
                this.wobble = Math.random() * 100;
                const hues = [345, 352, 5, 335];
                this.color = `hsla(${hues[Math.floor(Math.random() * hues.length)]}, 90%, 65%, 0.42)`;
            }
            update() {
                this.y -= this.speedY;
                this.wobble += 0.02;
                this.x += Math.sin(this.wobble) * 0.35;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + this.radius);
                ctx.quadraticCurveTo(this.x - 2, this.y + this.radius + 10, this.x, this.y + this.radius + 20);
                ctx.stroke();
            }
        }

        function getSceneTargets(stageNum) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const targets = [];
            const step = 4;

            if (stageNum >= 1 && stageNum <= 3) {
                ctx.font = `bold ${Math.min(canvas.width * 0.5, 260)}px sans-serif`;
                ctx.fillText(stageNum, canvas.width / 2, canvas.height / 2);
            } else if (stageNum === 5) {
                // Precise math layout for horizontal line centering: "I   ❤️   YOU"
                const size = Math.min(canvas.width * 0.11, 60);
                ctx.font = `bold ${size}px sans-serif`;
                
                const centerY = canvas.height / 2;
                const spaceX = size * 1.5; 

                // Generate exact points for "I"
                ctx.fillText("I", canvas.width / 2 - spaceX, centerY);
                // Generate exact points for "YOU"
                ctx.fillText("YOU", canvas.width / 2 + spaceX, centerY);
                
                // Draw a beautiful procedural vector heart shape right in the middle space
                ctx.setTransform(1, 0, 0, 1, canvas.width / 2, centerY + (size*0.1));
                ctx.beginPath();
                const heartScale = size * 0.018;
                for (let t = 0; t < Math.PI * 2; t += 0.05) {
                    let hx = 16 * Math.pow(Math.sin(t), 3) * heartScale;
                    let hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * heartScale;
                    ctx.lineTo(hx, hy);
                }
                ctx.fill();
                ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset translation matrices
            }

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    if (imgData.data[(y * canvas.width + x) * 4 + 3] > 120) {
                        targets.push({ x, y });
                    }
                }
            }
            return targets;
        }

        let currentTargets = [];
        function updateStageTargets(stageNum) {
            currentTargets = getSceneTargets(stageNum);
            while (particles.length < currentTargets.length) {
                particles.push(new CosmicParticle());
            }
        }

        function triggerBoom() {
            currentStage = 4;
            particles.forEach(p => p.explode());
            for(let i = 0; i < 28; i++) balloons.push(new BackgroundBalloon());

            setTimeout(() => {
                currentStage = 5;
                updateStageTargets(5);
            }, 900);
        }

        // Lock-forward algorithm mapping to prevent back-glitching from messy hands frames
        function handleGesture(fingerCount) {
            if (currentStage >= 4) return;

            if (fingerCount === 1 && currentStage < 1) {
                currentStage = 1;
                updateStageTargets(1);
            } else if (fingerCount === 2 && currentStage === 1) {
                currentStage = 2;
                updateStageTargets(2);
            } else if (fingerCount === 3 && currentStage === 2) {
                currentStage = 3;
                updateStageTargets(3);
            } else if ((fingerCount === 5 || fingerCount === 0) && currentStage === 3) {
                triggerBoom();
            }
        }

        function loop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.24)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Layer 1: Balloons float in background layer cleanly
            balloons.forEach(b => { b.update(); b.draw(); });
            balloons = balloons.filter(b => b.y > -100);
            if (currentStage === 5 && Math.random() < 0.035) balloons.push(new BackgroundBalloon());

            // Layer 2: Main interactive tracking plane draws over balloons
            particles.forEach((p, idx) => {
                if (currentStage === 0) {
                    p.updateAmbient();
                } else if (currentStage >= 1 && currentStage <= 3) {
                    let target = currentTargets[idx];
                    if (target) {
                        p.updateTarget(target.x, target.y, '#ff4d79'); // Sleek reddish-pink number
                    } else {
                        p.updateAmbient();
                    }
                } else if (currentStage === 4) {
                    p.updateExplosion();
                } else if (currentStage === 5) {
                    let target = currentTargets[idx];
                    if (target) {
                        // Color segmentation logic: center section items turn crimson red
                        const centerCut = canvas.width * 0.14;
                        if (target.x > (canvas.width / 2 - centerCut) && target.x < (canvas.width / 2 + centerCut)) {
                            p.updateTarget(target.x, target.y, '#ff1a53'); // Crimson Red Heart
                        } else {
                            p.updateTarget(target.x, target.y, '#FFFFFF'); // Stellar White text
                        }
                    } else {
                        p.updateAmbient();
                    }
                }
                p.draw();
            });

            requestAnimationFrame(loop);
        }

        function startExperience() {
            overlay.style.opacity = 0;
            setTimeout(() => overlay.style.display = 'none', 500);

            particles = Array.from({ length: maxParticles }, () => new CosmicParticle());

            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.75,
                minTrackingConfidence: 0.75
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    let fingersUp = 0;
                    
                    // Upgraded detection formula tracking extended posture relative to knuckles
                    if (landmarks[8].y < landmarks[6].y) fingersUp++;  // Index
                    if (landmarks[12].y < landmarks[10].y) fingersUp++; // Middle
                    if (landmarks[16].y < landmarks[14].y) fingersUp++; // Ring
                    if (landmarks[20].y < landmarks[18].y) fingersUp++; // Pinky
                    
                    // Thumb open checker
                    if (Math.abs(landmarks[4].x - landmarks[9].x) > Math.abs(landmarks[3].x - landmarks[9].x)) {
                        fingersUp++;
                    }

                    handleGesture(fingersUp);
                }
            });

            const camera = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                width: 480,
                height: 640
            });
            camera.start();
            loop();
        }
    </script>
</body>
</html>
