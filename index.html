<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Beloved Cosmic Countdown</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #video {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 95px;
            height: 130px;
            border-radius: 16px;
            border: 2px solid rgba(255, 105, 180, 0.4);
            transform: scaleX(-1);
            object-fit: cover;
            z-index: 10;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            z-index: 100;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.5s ease;
        }

        .glass-btn {
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.2), rgba(255, 192, 203, 0.1));
            border: 1px solid rgba(255, 105, 180, 0.4);
            padding: 16px 40px;
            color: white;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            margin-top: 25px;
            box-shadow: 0 4px 20px rgba(255, 105, 180, 0.2);
            letter-spacing: 1px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="overlay">
        <h2 style="color: #ff69b4; font-size: 1.8rem; margin-bottom: 10px;">✨ Cosmic Gesture ✨</h2>
        <p style="color: #ccc; max-width: 280px; font-size: 0.95rem; line-height: 1.5;">Place phone steadily, step back, and count down with your fingers (1 → 2 → 3 → Open Palm!).</p>
        <button class="glass-btn" onclick="startExperience()">Open Portal</button>
    </div>

    <canvas id="canvas"></canvas>
    <video id="video" playsinline></video>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');

        let currentStage = 0; // 0: Idle, 1-3: Countdown, 4: Exploded, 5: Final Story Sequence
        let storyTimeline = 0; // Handles alternating I -> Heart -> YOU sequence
        let timelineCounter = 0;
        
        let particles = [];
        let balloons = [];
        let stars = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Passive soft circular white background particles
        class BackgroundStar {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = 1.5 + Math.random() * 2.5;
                this.alpha = Math.random() * 0.7;
                this.speed = 0.005 + Math.random() * 0.01;
            }
            update() {
                this.alpha += this.speed;
                if (this.alpha > 0.8 || this.alpha < 0.1) this.speed = -this.speed;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(this.alpha)})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Main Tracking & Morphing Particle Engine
        class Particle {
            constructor(x, y, color) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = 0;
                this.vy = 0;
                this.size = 2.5 + Math.random() * 2;
                this.color = color || '#fff';
                this.ease = 0.08 + Math.random() * 0.08;
            }
            update(targetX, targetY) {
                let dx = targetX - this.x;
                let dy = targetY - this.y;
                this.x += dx * this.ease;
                this.y += dy * this.ease;
            }
            explode() {
                const angle = Math.random() * Math.PI * 2;
                const force = 12 + Math.random() * 18;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
            }
            updateExplosion() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.92;
                this.vy *= 0.92;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Deep Background Particle Balloons (Layered under text)
        class ParticleBalloon {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 20 + Math.random() * 18;
                this.speedY = 1.0 + Math.random() * 1.5;
                this.wobble = Math.random() * 100;
                // Pinkish/Reddish/Soft Magenta theme palette
                const hues = [340, 355, 15, 330];
                this.color = `hsla(${hues[Math.floor(Math.random() * hues.length)]}, 85%, 65%, 0.45)`;
            }
            update() {
                this.y -= this.speedY;
                this.wobble += 0.03;
                this.x += Math.sin(this.wobble) * 0.4;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + this.radius);
                ctx.quadraticCurveTo(this.x - 3, this.y + this.radius + 10, this.x, this.y + this.radius + 22);
                ctx.stroke();
            }
        }

        // Direct Coordinate Map Synthesizer
        function getTargets(type, value) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (type === 'text') {
                ctx.font = `bold ${Math.min(canvas.width * 0.45, 260)}px sans-serif`;
                ctx.fillText(value, canvas.width / 2, canvas.height / 2);
            } else if (type === 'heart') {
                // Procedural Particle Heart Vector Path
                const size = Math.min(canvas.width, canvas.height) * 0.015;
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.beginPath();
                for (let t = 0; t < Math.PI * 2; t += 0.02) {
                    // Parametric Heart Formula
                    let hx = 16 * Math.pow(Math.sin(t), 3) * size;
                    let hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * size;
                    ctx.lineTo(hx, hy);
                }
                ctx.fill();
                ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset matrix
            }

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const targets = [];
            const step = 5; 

            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    if (imgData.data[(y * canvas.width + x) * 4 + 3] > 128) {
                        targets.push({ x, y });
                    }
                }
            }
            return targets;
        }

        let currentTargets = [];
        function morphTo(type, value, color) {
            currentTargets = getTargets(type, value);
            // Re-allocate structural pool bounds without hard flashing
            while (particles.length < currentTargets.length) {
                particles.push(new Particle(canvas.width / 2, canvas.height / 2, color));
            }
            particles.forEach(p => p.color = color);
        }

        function triggerBoom() {
            currentStage = 4;
            particles.forEach(p => p.explode());
            
            // Populate background balloons cleanly behind text canvas
            for(let i=0; i<30; i++) {
                balloons.push(new ParticleBalloon(Math.random() * canvas.width, canvas.height + 60));
            }

            // Begin evolving presentation timeline loop after the dust settles
            setTimeout(() => {
                currentStage = 5;
                storyTimeline = 1; // Slide onto "I"
                morphTo('text', 'I', '#FFFFFF');
                timelineCounter = 0;
            }, 1000);
        }

        function handleGesture(fingerCount) {
            if (currentStage >= 4) return;

            if (fingerCount === 1 && currentStage !== 1) {
                currentStage = 1;
                morphTo('text', '1', '#ff4d79'); // Rich pinkish-red
            } else if (fingerCount === 2 && currentStage !== 2) {
                currentStage = 2;
                morphTo('text', '2', '#ff3366');
            } else if (fingerCount === 3 && currentStage !== 3) {
                currentStage = 3;
                morphTo('text', '3', '#ff0055');
            } else if (fingerCount === 5 && currentStage === 3) {
                triggerBoom(); // Straight open palm activates the kinetic explosion
            }
        }

        // Render Loop Execution Plane
        function loop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)'; // Smooth light decay trail
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Layer 1: Passive White Circular Background Dots
            stars.forEach(s => { s.update(); s.draw(); });

            // Layer 2: Shimmering Particle Balloons (Behind the text)
            balloons.forEach(b => { b.update(); b.draw(); });
            // Clean out scrolled elements safely
            balloons = balloons.filter(b => b.y > -100);
            if (currentStage === 5 && Math.random() < 0.04) {
                balloons.push(new ParticleBalloon(Math.random() * canvas.width, canvas.height + 40));
            }

            // Layer 3: Interactive Tracking Text / Letter Morph Core
            if (currentStage >= 1 && currentStage <= 3) {
                particles.forEach((p, idx) => {
                    let target = currentTargets[idx] || currentTargets[currentTargets.length - 1];
                    if (target) p.update(target.x, target.y);
                    p.draw();
                });
            } else if (currentStage === 4) {
                particles.forEach(p => { p.updateExplosion(); p.draw(); });
            } else if (currentStage === 5) {
                // Sequence Timing Automation logic (I -> Heart -> YOU loop)
                timelineCounter++;
                if (timelineCounter > 140) { // Every ~2.5 seconds, shift sequence
                    timelineCounter = 0;
                    storyTimeline++;
                    if (storyTimeline > 3) storyTimeline = 1;

                    if (storyTimeline === 1) morphTo('text', 'I', '#FFFFFF');
                    else if (storyTimeline === 2) morphTo('heart', '', '#ff1a53'); // Pure pulsing red-pink heart
                    else if (storyTimeline === 3) morphTo('text', 'YOU', '#FFFFFF');
                }

                particles.forEach((p, idx) => {
                    let target = currentTargets[idx] || currentTargets[currentTargets.length - 1];
                    if (target) p.update(target.x, target.y);
                    p.draw();
                });
            }

            requestAnimationFrame(loop);
        }

        function startExperience() {
            overlay.style.opacity = 0;
            setTimeout(() => overlay.style.display = 'none', 500);

            stars = Array.from({ length: 70 }, () => new BackgroundStar());

            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.65,
                minTrackingConfidence: 0.65
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    
                    let fingersUp = 0;
                    const tipIds = [8, 12, 16, 20];
                    
                    tipIds.forEach(tip => {
                        if (landmarks[tip].y < landmarks[tip - 2].y) fingersUp++;
                    });
                    
                    // Direct Thumb Extension detection matrix
                    if (Math.abs(landmarks[4].x - landmarks[17].x) > Math.abs(landmarks[3].x - landmarks[17].x)) {
                        fingersUp++;
                    }

                    handleGesture(fingersUp);
                }
            });

            const camera = new Camera(video, {
                onFrame: async () => {
                    await hands.send({ image: video });
                },
                width: 480,
                height: 640
            });
            camera.start();
            loop();
        }
    </script>
</body>
</html>
