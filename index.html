<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cosmic Unified Countdown</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #video {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 95px;
            height: 130px;
            border-radius: 16px;
            border: 2px solid rgba(255, 105, 180, 0.4);
            transform: scaleX(-1);
            object-fit: cover;
            z-index: 10;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            z-index: 100;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.5s ease;
        }

        .glass-btn {
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.2), rgba(255, 192, 203, 0.1));
            border: 1px solid rgba(255, 105, 180, 0.4);
            padding: 16px 40px;
            color: white;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            margin-top: 25px;
            box-shadow: 0 4px 20px rgba(255, 105, 180, 0.2);
            letter-spacing: 1px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="overlay">
        <h2 style="color: #ff69b4; font-size: 1.8rem; margin-bottom: 10px;">✨ Cosmic Gesture ✨</h2>
        <p style="color: #ccc; max-width: 280px; font-size: 0.95rem; line-height: 1.5;">Place phone steadily, step back, and count down with your fingers (1 → 2 → 3 → Open Palm!).</p>
        <button class="glass-btn" onclick="startExperience()">Open Portal</button>
    </div>

    <canvas id="canvas"></canvas>
    <video id="video" playsinline></video>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');

        let currentStage = 0; // 0: Ambient Sky, 1-3: Numbers, 4: Explosion Burst, 5: Horizontal I ❤️ YOU
        let particles = [];
        let balloons = [];
        const maxParticles = 900; // Keep performance high on mobile webkit

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Unified Swarm Particle Class
        class SwarmParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.size = 2 + Math.random() * 2;
                this.baseColor = '#FFFFFF';
                this.currentColor = '#FFFFFF';
                this.alpha = 0.4 + Math.random() * 0.5;
                this.ease = 0.07 + Math.random() * 0.06;
                this.isExploding = false;
            }

            updateAmbient() {
                // Natural drift simulation for midnight sky feel
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                this.currentColor = `rgba(255, 255, 255, ${this.alpha})`;
            }

            updateTarget(tx, ty, targetColor) {
                // Kinetic snapping formula pulling particles into vector paths
                let dx = tx - this.x;
                let dy = ty - this.y;
                this.x += dx * this.ease;
                this.y += dy * this.ease;
                this.currentColor = targetColor;
            }

            explode() {
                const angle = Math.random() * Math.PI * 2;
                const force = 15 + Math.random() * 20;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
                this.isExploding = true;
            }

            updateExplosion() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.91; // Air friction deceleration mapping
                this.vy *= 0.91;
            }

            draw() {
                ctx.fillStyle = this.currentColor;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Ambient Background Particle Balloons (Guaranteed underneath text rendering)
        class BackgroundBalloon {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 50;
                this.radius = 22 + Math.random() * 16;
                this.speedY = 1.2 + Math.random() * 1.6;
                this.wobble = Math.random() * 100;
                const hues = [345, 355, 10, 330]; // Romantic warm hues
                this.color = `hsla(${hues[Math.floor(Math.random() * hues.length)]}, 85%, 60%, 0.45)`;
            }
            update() {
                this.y -= this.speedY;
                this.wobble += 0.025;
                this.x += Math.sin(this.wobble) * 0.4;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + this.radius);
                ctx.quadraticCurveTo(this.x - 3, this.y + this.radius + 12, this.x, this.y + this.radius + 24);
                ctx.stroke();
            }
        }

        // Matrix Coordinate Generator
        function generateStructuralTargets(type, value) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (type === 'countdown') {
                ctx.font = `bold ${Math.min(canvas.width * 0.5, 280)}px sans-serif`;
                ctx.fillText(value, canvas.width / 2, canvas.height / 2);
            } else if (type === 'final') {
                const fontSize = Math.min(canvas.width * 0.12, 65);
                ctx.font = `bold ${fontSize}px sans-serif`;
                ctx.fillText("I  ❤️  YOU", canvas.width / 2, canvas.height / 2);
            }

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const targets = [];
            
            // Adjust resolution spacing depending on system constraints
            const step = canvas.width < 500 ? 4 : 5;

            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    if (imgData.data[(y * canvas.width + x) * 4 + 3] > 110) {
                        targets.push({ x, y });
                    }
                }
            }
            return targets;
        }

        let currentTargets = [];
        function remapSwarm(type, value) {
            currentTargets = generateStructuralTargets(type, value);
            // Dynamic sorting to minimize cross-screen parsing lines
            currentTargets.sort((a, b) => a.y - b.y || a.x - b.x);
        }

        function triggerBoom() {
            currentStage = 4;
            particles.forEach(p => p.explode());
            
            // Spawn background layer balloons instantly
            for(let i = 0; i < 25; i++) {
                balloons.push(new BackgroundBalloon());
            }

            // Snaps directly into horizontal line structure cleanly
            setTimeout(() => {
                currentStage = 5;
                remapSwarm('final', '');
            }, 900);
        }

        function handleGesture(fingerCount) {
            if (currentStage >= 4) return;

            if (fingerCount === 1 && currentStage !== 1) {
                currentStage = 1;
                remapSwarm('countdown', '1');
            } else if (fingerCount === 2 && currentStage !== 2) {
                currentStage = 2;
                remapSwarm('countdown', '2');
            } else if (fingerCount === 3 && currentStage !== 3) {
                currentStage = 3;
                remapSwarm('countdown', '3');
            } else if (fingerCount === 5 && currentStage === 3) {
                triggerBoom();
            }
        }

        // Master Animation Loop Plane
        function loop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.22)'; // Smooth persistence trailing
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // STEP 1: Render Balloons FIRST so they act as background layer behind text
            balloons.forEach(b => { b.update(); b.draw(); });
            balloons = balloons.filter(b => b.y > -100);
            if (currentStage === 5 && Math.random() < 0.03) {
                balloons.push(new BackgroundBalloon());
            }

            // STEP 2: Render Core Interactive Swarm Particle Plane
            particles.forEach((p, idx) => {
                if (currentStage === 0) {
                    p.updateAmbient();
                } else if (currentStage >= 1 && currentStage <= 3) {
                    let target = currentTargets[idx];
                    if (target) {
                        p.updateTarget(target.x, target.y, '#ff4d79'); // Snaps to pink-red shape
                    } else {
                        p.updateAmbient(); // Leftover background dots continue hovering
                    }
                } else if (currentStage === 4) {
                    p.updateExplosion();
                } else if (currentStage === 5) {
                    let target = currentTargets[idx];
                    if (target) {
                        // Split line into localized segment colors (Center Heart section turns crimson)
                        const middleCut = canvas.width * 0.16;
                        if (target.x > (canvas.width / 2 - middleCut) && target.x < (canvas.width / 2 + middleCut)) {
                            p.updateTarget(target.x, target.y, '#ff1a53'); // Crimson Heart
                        } else {
                            p.updateTarget(target.x, target.y, '#FFFFFF'); // Stellar White text
                        }
                    } else {
                        // Ambient drift fallback for unmapped particles
                        p.updateAmbient();
                    }
                }
                p.draw();
            });

            requestAnimationFrame(loop);
        }

        function startExperience() {
            overlay.style.opacity = 0;
            setTimeout(() => overlay.style.display = 'none', 500);

            // Populate the primary unified system matrix pool
            particles = Array.from({ length: maxParticles }, () => new SwarmParticle());

            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    
                    let fingersUp = 0;
                    const tipIds = [8, 12, 16, 20];
                    
                    tipIds.forEach(tip => {
                        if (landmarks[tip].y < landmarks[tip - 2].y) fingersUp++;
                    });
                    
                    if (landmarks[4].x < landmarks[3].x) fingersUp++;

                    handleGesture(fingersUp);
                }
            });

            const camera = new Camera(video, {
                onFrame: async () => {
                    await hands.send({ image: video });
                },
                width: 480,
                height: 640
            });
            camera.start();
            loop();
        }
    </script>
</body>
</html>
